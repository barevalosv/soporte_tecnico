<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soporte Técnico - Aula</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Soporte Técnico 🛠️</h1>
        
        <div class="contador-container">
            Total Tickets: <span id="contador">0</span>
        </div>

        <div class="formulario">
            <input type="text" id="equipo" placeholder="Ej. Ordenador 04, Portátil 2...">
            <input type="text" id="problema" placeholder="Ej. No enciende, Pantallazo azul...">
            <button id="btnAbrir">Abrir Ticket</button>
        </div>

        <h2>Historial de Incidencias</h2>
        <ul id="listaTickets">
            </ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
